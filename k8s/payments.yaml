apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: barakaya
  labels:
    app: payments
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      containers:
        - name: payments
          image: ghcr.io/abrifuh6/barakaya/payments:latest
          ports:
            - containerPort: 3004
          env:
            - name: PAYMENTS_PORT
              value: "3004"
            - name: DATABASE_URL
              value: "file:/data/dev.db"
          volumeMounts:
            - name: payments-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
      volumes:
        - name: payments-data
          persistentVolumeClaim:
            claimName: payments-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: payments
  namespace: barakaya
spec:
  selector:
    app: payments
  ports:
    - port: 3004
      targetPort: 3004
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: payments-pvc
  namespace: barakaya
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

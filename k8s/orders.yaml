apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: barakaya
  labels:
    app: orders
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: ghcr.io/abrifuh6/barakaya/orders:latest
          ports:
            - containerPort: 3003
          env:
            - name: ORDERS_PORT
              value: "3003"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: barakaya-secrets
                  key: JWT_SECRET
            - name: CATALOG_URL
              value: "http://catalog:3002"
            - name: PAYMENTS_URL
              value: "http://payments:3004"
            - name: DATABASE_URL
              value: "file:/data/dev.db"
          volumeMounts:
            - name: orders-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
      volumes:
        - name: orders-data
          persistentVolumeClaim:
            claimName: orders-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: barakaya
spec:
  selector:
    app: orders
  ports:
    - port: 3003
      targetPort: 3003
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: orders-pvc
  namespace: barakaya
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

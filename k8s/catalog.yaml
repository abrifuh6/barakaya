apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: barakaya
  labels:
    app: catalog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
        - name: catalog
          image: ghcr.io/abrifuh6/barakaya/catalog:latest
          ports:
            - containerPort: 3002
          env:
            - name: CATALOG_PORT
              value: "3002"
            - name: DATABASE_URL
              value: "file:/data/dev.db"
          volumeMounts:
            - name: catalog-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
      volumes:
        - name: catalog-data
          persistentVolumeClaim:
            claimName: catalog-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: barakaya
spec:
  selector:
    app: catalog
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: catalog-pvc
  namespace: barakaya
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

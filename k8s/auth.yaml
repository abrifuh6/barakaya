apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: barakaya
  labels:
    app: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: ghcr.io/abrifuh6/barakaya/auth:latest
          ports:
            - containerPort: 3001
          env:
            - name: AUTH_PORT
              value: "3001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: barakaya-secrets
                  key: JWT_SECRET
            - name: DATABASE_URL
              value: "file:/data/dev.db"
          volumeMounts:
            - name: auth-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
      volumes:
        - name: auth-data
          persistentVolumeClaim:
            claimName: auth-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: barakaya
spec:
  selector:
    app: auth
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: auth-pvc
  namespace: barakaya
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

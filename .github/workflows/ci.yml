name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint & validate ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, catalog, orders, payments, gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Check for syntax errors
        working-directory: services/${{ matrix.service }}
        run: node --check src/index.js

  # ── Build Docker images ──────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [auth, catalog, orders, payments, gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Integration smoke test ────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: |
          docker compose up --build -d
          echo "Waiting for services to become healthy..."
          timeout 120 bash -c '
            until docker compose ps | grep -E "(gateway|auth|catalog|orders|payments)" | grep -v "starting" | grep -c "healthy" | grep -q "^5"; do
              echo "  still waiting..."
              sleep 5
            done
          ' || (docker compose logs && exit 1)

      - name: Health checks
        run: |
          curl -sf http://localhost:8080/health
          curl -sf http://localhost:8080/auth/health
          curl -sf http://localhost:8080/catalog/health
          curl -sf http://localhost:8080/orders/health
          curl -sf http://localhost:8080/payments/health

      - name: Register and login
        run: |
          REGISTER=$(curl -sf -X POST http://localhost:8080/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@test.com","password":"secret123"}')
          echo "Register: $REGISTER"
          TOKEN=$(echo $REGISTER | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Browse catalog
        run: |
          PRODUCTS=$(curl -sf http://localhost:8080/catalog/products)
          echo "Products: $PRODUCTS"
          PRODUCT_ID=$(echo $PRODUCTS | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
          echo "PRODUCT_ID=$PRODUCT_ID" >> $GITHUB_ENV

      - name: Place an order
        run: |
          ORDER=$(curl -sf -X POST http://localhost:8080/orders \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d "{\"items\":[{\"productId\":\"$PRODUCT_ID\",\"quantity\":1}]}")
          echo "Order: $ORDER"

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── Push to GHCR (only on push to main/master) ────────────────────────────────
  push:
    name: Push Images
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [auth, catalog, orders, payments, gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

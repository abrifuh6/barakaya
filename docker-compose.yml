version: "3.9"

services:
  # ── Auth ────────────────────────────────────────────────────────────────────
  auth:
    build: ./services/auth
    working_dir: /app
    environment:
      - JWT_SECRET=${JWT_SECRET:-devsecret}
      - AUTH_PORT=${AUTH_PORT:-3001}
      - DATABASE_URL=file:/app/prisma/dev.db
    volumes:
      - auth_data:/app/prisma
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # ── Catalog ─────────────────────────────────────────────────────────────────
  catalog:
    build: ./services/catalog
    working_dir: /app
    environment:
      - CATALOG_PORT=${CATALOG_PORT:-3002}
      - DATABASE_URL=file:/app/prisma/dev.db
    volumes:
      - catalog_data:/app/prisma
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # ── Payments ─────────────────────────────────────────────────────────────────
  payments:
    build: ./services/payments
    working_dir: /app
    environment:
      - PAYMENTS_PORT=${PAYMENTS_PORT:-3004}
      - DATABASE_URL=file:/app/prisma/dev.db
    volumes:
      - payments_data:/app/prisma
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # ── Orders ──────────────────────────────────────────────────────────────────
  orders:
    build: ./services/orders
    working_dir: /app
    environment:
      - ORDERS_PORT=${ORDERS_PORT:-3003}
      - JWT_SECRET=${JWT_SECRET:-devsecret}
      - CATALOG_URL=http://catalog:3002
      - PAYMENTS_URL=http://payments:3004
      - DATABASE_URL=file:/app/prisma/dev.db
    volumes:
      - orders_data:/app/prisma
    depends_on:
      catalog:
        condition: service_healthy
      payments:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # ── Gateway ──────────────────────────────────────────────────────────────────
  gateway:
    build: ./services/gateway
    working_dir: /app
    environment:
      - GATEWAY_PORT=${GATEWAY_PORT:-8080}
      - AUTH_URL=http://auth:3001
      - CATALOG_URL=http://catalog:3002
      - ORDERS_URL=http://orders:3003
      - PAYMENTS_URL=http://payments:3004
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      auth:
        condition: service_healthy
      catalog:
        condition: service_healthy
      orders:
        condition: service_healthy
      payments:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  auth_data:
  catalog_data:
  orders_data:
  payments_data:
